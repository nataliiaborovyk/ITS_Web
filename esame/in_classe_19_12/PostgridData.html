<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        background-color: #f4f4f9;
        padding: 30px;
      }
      #root {
        display: flex;
        flex-wrap: wrap;
        gap: 20px;
        justify-content: center;
      }
      .card {
        background-color: white;
        border: 1px solid #c9c9c9;
        padding: 20px;
        border-radius: 15px;
        max-width: 350px;
        box-shadow: 0 4px 8px rgb(0, 0, 0, 0.1);
      }

      .card p {
        font-size: 0.8rem;
      }
      .card ul {
        list-style-type: none;
        padding-left: 0;
      }
      .card li {
        margin: 5px 0;
        padding: 2px 0;
      }
      .card h2 {
        font-size: 1.4rem;
      }
      .card small {
        color: cornflowerblue;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script>
      const urlPosts = "https://jsonplaceholder.typicode.com/posts/";
      const urlUsers = "https://jsonplaceholder.typicode.com/users/";
      const urlCommenti = "https://jsonplaceholder.typicode.com/comments"; //?postId=1
      const divContainer = document.getElementById("root");
      async function deatilPosts(post) {
        const jsonUser = fetch(urlUsers + post.userId).then((resp) =>
          resp.json()
        );
        const jsonCommenti = fetch(urlCommenti + "?postId=" + post.id).then(
          (resp) => resp.json()
        );

        const [user, commenti] = await Promise.all([jsonUser, jsonCommenti]);

        const postPlus = {
          ...post,
          username: user.username,
          comments: commenti,
        };
        return postPlus;
      }

      async function loadPosts() {
        const response = await fetch(urlPosts);
        const posts = await response.json();

        const postsPlusPromise = posts.map((post) => deatilPosts(post));
        const postsPlus = await Promise.all(postsPlusPromise);
        divContainer.innerHTML = "";
        postsPlus.forEach((post) => {
            const commentiHtml=post.comments.map(c=>'<li>'+c.name+'</li>').join("")
          divContainer.innerHTML += `
          <div class="card">
                 <h2>${post.title}</h2>
                <p>${post.body}</p>
                  <small>${post.username}</small>
                  <ul>${commentiHtml}</ul>
                </div>
                `;
        });
      }
      loadPosts();
    </script>
  </body>
</html>
