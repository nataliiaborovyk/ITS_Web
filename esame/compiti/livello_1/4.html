<!-- 4. Card Centrata
Richiesto: un contenitore largo 400px centrato orizzontalmente, contenente una card con titolo,
descrizione e area prezzo.
Usare: margin per centratura, padding interno, bordo per distinzione.
Risultato: card visibile e ben separata dal resto della pagina. -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container{
            width: 400px;
            margin:auto;
        }
        .card{
            background-color: rgb(243, 252, 159);
            border-radius: 10px;
            border: 10px  solid rgb(21, 106, 21);  
            padding: 30px;
        }
        .prezzo{
            font-size: 20px;
            margin: 15px

        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h3 >Card Centrata</h3>
            <p>Richiesto: un contenitore largo 400px centrato orizzontalmente, contenente una card con titolo,
        descrizione e area prezzo.</p>
            <div class="prezzo">Risultato: card visibile e ben separata dal resto della pagina.</div>
        </div>
    </div>    
</body>
</html>
