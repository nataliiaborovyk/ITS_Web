<!-- 5. Evidenziazione Input con Focus
Richiesto: due campi input (testo e password) che mostrano un bordo colorato quando ricevono
focus.
Usare: pseudo-classe :focus.
Risultato: campo evidenziato chiaramente mentre l’utente digita. -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        input{
            width: 200px;
            padding: 20px;
            border: 1px solid blue;
            border-radius: 5px;
            font-size: 10px;
        }
        input:focus{
            border: 2px solid rgb(249, 131, 131);
            background-color: rgb(246, 246, 215);
        }
    </style>
</head>
<body>
    <input type="text" placeholder="Login">
    <input type="password" placeholder="Password">
</body>
</html>
