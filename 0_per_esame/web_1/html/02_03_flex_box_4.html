<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox Demo Completa</title>

    <style>
        .container {
            width: 200px;
            height: 150px;
            border: 2px solid black;
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
            background-color: #f0f0f0;
        }

        .box {
            width: 60px;
            height: 40px;
            background-color: lightblue;
            border: 1px solid blue;
            text-align: center;
            line-height: 40px;
        }

        /* ---- VARIANTI ---- */

        /* 1) ROW + NOWRAP */
        .row-nowrap {
            flex-direction: row;
            flex-wrap: nowrap;
        }

        /* 2) ROW + WRAP */
        .row-wrap {
            flex-direction: row;
            flex-wrap: wrap;
        }

        /* 3) COLUMN + NOWRAP */
        .column-nowrap {
            flex-direction: column;
            flex-wrap: nowrap;
        }

        /* 4) COLUMN + WRAP */
        .column-wrap {
            flex-direction: column;
            flex-wrap: wrap;
        }

    </style>
</head>
<body>

<h2>1) flex-direction: row + flex-wrap: nowrap</h2>
<div class="container row-nowrap">
    <div class="box">io</div>
    <div class="box">sto</div>
    <div class="box">studiando</div>
    <div class="box">flex</div>
</div>
<!-- RISULTATO:
[io][sto][studiando][flex] → se non c'è spazio → overflow
-->


<h2>2) flex-direction: row + flex-wrap: wrap</h2>
<div class="container row-wrap">
    <div class="box">io</div>
    <div class="box">sto</div>
    <div class="box">studiando</div>
    <div class="box">flex</div>
</div>
<!-- RISULTATO:
[io][sto][studiando]
[flex]
-->


<h2>3) flex-direction: column + flex-wrap: nowrap</h2>
<div class="container column-nowrap">
    <div class="box">io</div>
    <div class="box">sto</div>
    <div class="box">studiando</div>
    <div class="box">flex</div>
</div>
<!-- RISULTATO:
io
sto
studiando
flex
(se non c'è spazio → overflow verticale)
-->


<h2>4) flex-direction: column + flex-wrap: wrap</h2>
<div class="container column-wrap">
    <div class="box">io</div>
    <div class="box">sto</div>
    <div class="box">studiando</div>
    <div class="box">flex</div>
</div>
<!-- RISULTATO:
io      studiando
sto     flex
(se c'è spazio orizzontale a destra → WRAP IN ORIZZONTALE!)
-->

</body>
</html>
