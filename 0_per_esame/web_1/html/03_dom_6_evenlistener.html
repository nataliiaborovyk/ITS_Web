<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <input id="input1" type="text">
    <button id="b1">Aggiungi</button>
    <ul id="lista"></ul>

    <script>
        let inp = document.getElementById("input1")
        let but = document.getElementById("b1")
        let list = document.getElementById("lista")

        function aggiungi() {
            let x = document.createElement("li")
            let y = inp.value
            if (y === "") {
                return;
            }else{
            x.textContent = y
            list.append(x)
            inp.value = ""
            }
        } 
        but.addEventListener("click", aggiungi)
    </script>
</body>
</html>
