<!-- Progettare l’oggetto canzoni che contiene delle
proprietà: canzone1, canzone2, ecc… Queste
proprietà a sua volta sono degli oggetti che
hanno altre proprietà: titolo, nomeCantante e
anno. Inserire poi alcuni dati a piacere e
visualizzarli. Dopo fare inserire all’utente delle
nuove canzoni attraverso il prompt dei comandi.
Visualizzare il nuovo oggetto così costruito. -->

<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Oggetto Canzoni</title>
</head>
<body>

  <h2>Archivio Canzoni</h2>
  <pre id="output"></pre>

  <script>
    const canzoni = {
      canzone1: {
        titolo: "Shape of You",
        cantante: "Ed Sheeran",
        anno: 2017
      },
      canzone2: {
        titolo: "Someone Like You",
        cantante: "Adele",
        anno: 2011
      }
    };

    function stampa() {
      document.getElementById("output").innerText = 
        JSON.stringify(canzoni, null, 2);
    }

    stampa();

    const quante = Number(prompt("Quante nuove canzoni vuoi inserire?"));

    for(let i = 1; i <= quante; i++){
      const titolo = prompt("Inserisci titolo canzone " + i);
      const cantante = prompt("Inserisci cantante");
      const anno = prompt("Inserisci anno");

      canzoni["canzone" + (Object.keys(canzoni).length + 1)] = {
        titolo: titolo,
        cantante: cantante,
        anno: anno
      };
    }

    stampa();
  </script>

</body>
</html>
