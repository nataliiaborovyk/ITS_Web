<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .red {
            background-color: red;
        }
        .blue {
            background-color: blue;
        }
    </style>
</head>
<body>
    <div>Contatore</div>
    <div id="d1">0</div>
    <button id="b1">Aumenta</button>
    <button id="b2">Diminuisci</button>
    
    <script>
        let cont = document.getElementById("d1")
        let but1 = document.getElementById("b1")
        let but2 = document.getElementById("b2")

        function aumenta() {
            let x = Number(cont.textContent)
            x = x + 1
            cont.textContent = x
        }
        function diminuisci() {
            cont.textContent--
        }
        but1.addEventListener("click", aumenta)
        but2.addEventListener("click", diminuisci)
    </script>
</body>
</html>
